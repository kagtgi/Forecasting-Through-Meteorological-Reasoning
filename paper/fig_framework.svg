<rect x="367.0" y="78.0" width="146.0" height="104.0" rx="8" fill="#F3E8FD" stroke="#8430CE" stroke-width="1.3"/>
<text font-family="Helvetica,Arial,sans-serif" font-size="15" fill="#5B1C9E" x="440.0" y="98.0" text-anchor="middle" font-weight="700" dominant-baseline="central">3  Track</text>
<text font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#3C4043" x="440.0" y="120.0" text-anchor="middle" dominant-baseline="central">trajectory</text>
