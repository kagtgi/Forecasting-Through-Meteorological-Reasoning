<text font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#5F6368" x="526.8" y="116.0" text-anchor="middle" font-style="italic" dominant-baseline="central">ASG(t)</text>
<text font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#5F6368" x="700.2" y="116.0" text-anchor="middle" font-style="italic" dominant-baseline="central">ASG(t+h)</text>
<text font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#5F6368" x="440.0" y="216.0" text-anchor="middle" dominant-baseline="central">Identify (step 2) answers only 'what is here now?'; Track (step 3) answers 'where and how fast?'.</text>
<text font-family="Helvetica,Arial,sans-serif" font-size="11.5" fill="#5F6368" x="440.0" y="232.0" text-anchor="middle" dominant-baseline="central">The structured ASG(t) state is the only causal path to Nowcast; chain-of-thought is training-time only.</text>
