<text font-family="Helvetica,Arial,sans-serif" font-size="15" fill="#5B1C9E" x="266.5" y="98.0" text-anchor="middle" font-weight="700" dominant-baseline="central">2  Identify</text>
<text font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#3C4043" x="266.5" y="120.0" text-anchor="middle" dominant-baseline="central">per-frame</text>
<text font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#3C4043" x="266.5" y="139.0" text-anchor="middle" dominant-baseline="central">VLM objects</text>
